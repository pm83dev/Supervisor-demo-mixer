<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Ricette - Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
  <h1 class="text-center mb-4">Gestione Ricette - Demo Supervisore</h1>

  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>Ricette disponibili</span>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Nuova Ricetta</button>
    </div>
    <div class="card-body">
      <table class="table table-striped" id="recipesTable">
        <thead class="table-dark">
          <tr>
            <th>Nome</th>
            <th>Temp. target (°C)</th>
            <th>Tempo</th>
            <th>Azione</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="recipeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="recipeForm" onsubmit="saveRecipe(event)">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Nuova Ricetta</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="recipeIndex">
          <div class="mb-3">
            <label class="form-label">Nome ricetta</label>
            <input type="text" class="form-control" id="recipeName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Temperatura target (°C)</label>
            <input type="number" class="form-control" id="recipeTemp" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Tempo</label>
            <input type="text" class="form-control" id="recipeTime" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
          <button type="submit" class="btn btn-success">Salva</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="recipes.js"></script>
</body>
</html>
