<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Ciclo Turbomixer Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="text-center mb-4">Demo Ciclo Turbomixer</h1>

    <!-- Stato ciclo -->
    <div class="card mb-4">
      <div class="card-header bg-primary text-white">Stato ciclo</div>
      <div class="card-body">
        <p><b>Step corrente:</b> <span id="currentStep">-</span></p>
        <p><b>Condizione:</b> <span id="currentCondition">-</span></p>
      </div>
    </div>

    <!-- Tabella step -->
    <div class="card mb-4">
      <div class="card-header bg-success text-white">Step ciclo</div>
      <div class="card-body">
        <table class="table table-hover" id="stepsTable">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Nome step</th>
              <th>Condizione uscita</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Grafico realtime -->
    <div class="card">
      <div class="card-header bg-warning">Temperatura & Torque (simulazione realtime)</div>
      <div class="card-body">
        <canvas id="cycleChart" height="100"></canvas>
      </div>
    </div>
  </div>

  <script src="cycle.js"></script>
</body>
</html>
